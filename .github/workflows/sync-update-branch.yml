name: Upstream Sync

# 必须配置写权限，否则 GITHUB_TOKEN 无法推送
permissions:
  contents: write

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:    # 支持手动触发

jobs:
  sync-fork:
    name: Sync fork with upstream
    runs-on: ubuntu-latest
    steps:
      - name: Sync with upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 官方内置令牌，无需配置
        run: |
          # 同步上游 update 分支到你的仓库
          gh repo sync ${{ github.repository }} --branch update