name: 同步上游 update 分支
on:
  workflow_dispatch:  # 手动触发同步
  schedule:
    - cron: "0 2 * * *"  # 每天UTC 2点（北京时间10点）自动同步

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整提交历史，必须加
          token: ${{ secrets.GITHUB_TOKEN }}  # 官方内置令牌，无需配置

      - name: 配置Git身份
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: 添加上游原仓库
        run: git remote add upstream https://github.com/rt-bishop/Look4Sat.git

      - name: 拉取上游所有分支代码
        run: git fetch upstream

      - name: 切换到自己的 update 分支
        run: git checkout update

      - name: 合并上游 update 分支最新代码
        run: git merge --no-edit upstream/update

      - name: 推送到自己的 Fork 仓库
        run: git push origin update